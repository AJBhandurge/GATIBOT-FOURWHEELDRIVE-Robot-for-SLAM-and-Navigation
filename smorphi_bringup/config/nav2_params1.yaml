# NAV2 PARAM FILE - OPTIMIZED FOR RASPBERRY PI 4B
# Author: Ayush Bhandurge
# Optimizations:
#   - Reduced costmap update rates to save CPU
#   - Lowered DWB samples (still sufficient for reliable path completion)
#   - inflation_radius set to 0.2m as requested
#   - ObstacleFootprint.scale corrected to 32.0
#   - default_server_timeout explicitly typed as integer
#   - Larger movement_time_allowance for complex paths

amcl:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom"
    scan_topic: scan
    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    # --- Particle filter: reduced particles to save CPU ---
    # 500 min is enough for a mapped indoor environment.
    # If localization becomes unstable, raise max_particles back to 2000.
    min_particles: 300
    max_particles: 1200

    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 2.0

    # Laser model weights
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.1

    # Motion model noise - keep same, works for differential drive
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    tf_broadcast: true
    transform_tolerance: 0.5

    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0

    # Reduce AMCL update frequency - only update when robot moves 8cm or 5 deg
    # This saves CPU significantly on RPi4
    update_min_d: 0.08
    update_min_a: 0.05

    resample_interval: 2       # resample every 2 filter updates instead of every 1
    save_pose_rate: 0.5


controller_server:
  ros__parameters:
    use_sim_time: false

    # Reduced from 10Hz to 8Hz - saves ~20% CPU on controller loop.
    # Still fast enough for a robot with max_vel_x=0.26 m/s.
    controller_frequency: 8.0

    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    current_goal_checker: "goal_checker"
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.4
      # Increased to 30s so robot is not falsely flagged as stuck on complex paths
      movement_time_allowance: 30.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.15
      stateful: True

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      # Velocity limits
      min_vel_x: 0.0
      max_vel_x: 0.26
      max_vel_theta: 1.0        # slightly reduced from 1.2 - smoother turns, less jitter
      min_speed_xy: 0.0
      max_speed_xy: 0.26
      min_speed_theta: 0.0

      # Acceleration limits
      acc_lim_x: 1.0            # reduced from 1.5 - gentler accel, less motor stress on RPi
      acc_lim_theta: 2.0        # reduced from 2.5
      decel_lim_x: -1.5
      decel_lim_theta: -2.5

      # --- Sample counts: reduced to save CPU ---
      # 15x15 = 225 trajectories evaluated per cycle (was 400).
      # Sufficient for reliable path completion at this robot speed.
      vx_samples: 15
      vtheta_samples: 15

      # sim_time: how far ahead DWB simulates each trajectory.
      # 1.7s is the sweet spot for RPi4: long enough to handle complex paths,
      # short enough to keep computation under budget.
      sim_time: 1.7

      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: True   # skip bad trajectories early = big CPU saving
      stateful: True

      critics: ["RotateToGoal", "Oscillation", "ObstacleFootprint", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]

      # ObstacleFootprint MUST be high - this is what ensures paths are always completed
      # (robot won't get stuck trying to pass through obstacles)
      ObstacleFootprint.scale: 32.0

      GoalAlign.scale: 15.0
      GoalAlign.forward_point_distance: 0.1

      PathAlign.scale: 10.0
      PathAlign.forward_point_distance: 0.1

      PathDist.scale: 32.0      # increased: robot stays on planned path more aggressively
      GoalDist.scale: 24.0      # increased: robot always drives toward goal

      RotateToGoal.scale: 10.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

      Oscillation.scale: 1.0    # penalizes back-and-forth oscillation near obstacles


planner_server:
  ros__parameters:
    use_sim_time: false

    # Reduced from 10Hz - global planner does not need to run that often.
    # It only replans when path is invalid. 1Hz is standard and saves CPU.
    expected_planner_frequency: 1.0

    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true           # A* is faster and more optimal than Dijkstra on RPi
      allow_unknown: true


bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: !!int 10
    default_server_timeout: !!int 20   # !!int tag prevents the double/int type error
    default_nav_through_poses_bt_xml: ""
    default_nav_to_pose_bt_xml: "/home/smorphi/s_ws/src/smorphi_bringup/src/navigate_w_replanning_only_if_path_becomes_invalid_custom_file.xml"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_rate_controller_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_wait_action_bt_node                   # needed for Wait recovery in BT XML
      - nav2_back_up_action_bt_node                # needed for BackUp recovery in BT XML
      - nav2_spin_action_bt_node                   # needed for Spin recovery in BT XML
      - nav2_is_stuck_condition_bt_node


bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false


waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 10              # reduced from 20Hz - waypoint follower does not need 20Hz
    stop_on_failure: false


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_footprint

      # Reduced update/publish rates to save CPU on RPi4
      update_frequency: 4.0    # was 5.0
      publish_frequency: 2.0
      resolution: 0.05
      robot_radius: 0.20
      rolling_window: true
      width: 3
      height: 3

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: True
          clearing: True
          max_obstacle_height: 2.6
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.15   # as requested - tight inflation for narrow corridors


global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_footprint

      # Global costmap update rates - very low is fine, map is mostly static
      update_frequency: 0.5    # was 1.0 - only update twice per second
      publish_frequency: 0.5   # was 1.0
      resolution: 0.05
      robot_radius: 0.20

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: True
          clearing: True
          max_obstacle_height: 2.6
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.15   # as requested
map_server:
  ros__parameters:
    use_sim_time: False
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: ""

lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - controller_server
      - planner_server
      - bt_navigator
      - waypoint_follower
      - amcl
      - map_server
